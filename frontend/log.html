<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DMSKI – Aktivitätslog</title>
  <link rel="icon" href="/favicon.ico?v=2" type="image/x-icon" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="dashboard.css" />
  <script>if(!sessionStorage.getItem("token"))window.location.replace("/login.html");</script>
</head>
<body>
  <div id="authGate" class="auth-gate">
    <img src="assets/logo-dmski.png" alt="DMSKI" style="height:2.2rem;opacity:.7" />
    <p style="margin:.8rem 0 0;color:#4a6672;font-size:.92rem">Sitzung wird geprüft…</p>
  </div>

  <main class="page" style="display:none" id="logMain">
    <div id="site-nav"></div>

    <!-- Hero injected by nav.js -->

    <!-- ── Log Card ── -->
    <section class="log-card">

      <!-- Header Bar -->
      <div class="log-header">
        <div class="log-header-left">
          <h2 class="log-title">Session-Protokoll</h2>
          <span class="log-live-badge"><span class="log-live-dot"></span>Live</span>
        </div>
        <div class="log-header-right">
          <select id="filterAction" class="log-select">
            <option value="">Alle Aktionen</option>
            <option value="login">Login</option>
            <option value="logout">Logout</option>
            <option value="login_failed">Fehlgeschlagen</option>
            <option value="page:">Seitenaufrufe</option>
          </select>
          <button id="refreshBtn" class="log-btn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M1 4v6h6"/><path d="M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
            Aktualisieren
          </button>
        </div>
      </div>

      <!-- Loading State -->
      <div id="logLoading" class="log-state">
        <div class="log-spinner"></div>
        <span>Lade Aktivitätslog…</span>
      </div>

      <!-- Table -->
      <div id="logTable" style="display:none" class="log-table-wrap">
        <table class="log-table">
          <thead>
            <tr>
              <th>Zeitpunkt</th>
              <th>Benutzer</th>
              <th>Aktion</th>
              <th>IP-Adresse</th>
              <th>Browser</th>
            </tr>
          </thead>
          <tbody id="logBody"></tbody>
        </table>
      </div>

      <!-- Empty State -->
      <div id="logEmpty" style="display:none" class="log-state">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--ink-muted)" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M8 8h8M8 12h5"/></svg>
        <span style="margin-top:.5rem">Noch keine Einträge vorhanden.</span>
      </div>

      <!-- Pagination -->
      <div id="logPagination" class="log-pagination" style="display:none">
        <button id="prevBtn" class="log-btn log-btn-sm" disabled>Zurück</button>
        <span id="pageInfo" class="log-page-info"></span>
        <button id="nextBtn" class="log-btn log-btn-sm" disabled>Weiter</button>
      </div>

    </section>
  </main>

  <div id="site-footer"></div>

  <style>
    /* ── Log Card – Glassmorphism ── */
    .log-card {
      margin-top: 1.5rem;
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(24px) saturate(1.4);
      -webkit-backdrop-filter: blur(24px) saturate(1.4);
      border: 1px solid rgba(226,232,239,0.7);
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(26,43,60,0.06), 0 1px 3px rgba(26,43,60,0.04);
      overflow: hidden;
    }

    /* ── Header ── */
    .log-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border-soft, #EEF2F6);
      background: linear-gradient(135deg, rgba(26,43,60,0.02), rgba(197,160,89,0.03));
    }
    .log-header-left {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .log-header-right {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .log-title {
      margin: 0;
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--navy, #1A2B3C);
    }
    .log-live-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #16a34a;
      background: rgba(22,163,74,0.08);
      padding: 0.2rem 0.55rem;
      border-radius: 100px;
      border: 1px solid rgba(22,163,74,0.15);
    }
    .log-live-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #16a34a;
      animation: pulse 2s ease-in-out infinite;
    }

    /* ── Controls ── */
    .log-select {
      font-family: inherit;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--navy, #1A2B3C);
      background: rgba(26,43,60,0.04);
      border: 1px solid var(--border, #E2E8EF);
      border-radius: 8px;
      padding: 0.4rem 0.75rem;
      cursor: pointer;
      transition: all 0.18s;
      appearance: auto;
    }
    .log-select:hover { border-color: var(--gold, #C5A059); }
    .log-select:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 0 3px rgba(197,160,89,0.12); }

    .log-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-family: inherit;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--gold, #C5A059);
      background: rgba(197,160,89,0.06);
      border: 1px solid rgba(197,160,89,0.2);
      border-radius: 8px;
      padding: 0.4rem 0.9rem;
      cursor: pointer;
      transition: all 0.18s;
    }
    .log-btn:hover:not(:disabled) {
      background: rgba(197,160,89,0.12);
      border-color: rgba(197,160,89,0.4);
      box-shadow: 0 2px 8px rgba(197,160,89,0.1);
    }
    .log-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .log-btn-sm { font-size: 0.78rem; padding: 0.3rem 0.7rem; }

    /* ── Table ── */
    .log-table-wrap {
      overflow-x: auto;
      padding: 0 0.25rem;
    }
    .log-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
    }
    .log-table th {
      text-align: left;
      padding: 0.7rem 1rem;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-muted, #8899AA);
      border-bottom: 1px solid var(--border-soft, #EEF2F6);
      white-space: nowrap;
      background: rgba(248,249,250,0.5);
    }
    .log-table td {
      padding: 0.65rem 1rem;
      color: var(--ink-soft, #4A5568);
      border-bottom: 1px solid rgba(226,232,239,0.5);
      vertical-align: middle;
    }
    .log-table tbody tr {
      transition: background 0.15s;
    }
    .log-table tbody tr:hover td {
      background: rgba(197,160,89,0.03);
    }
    .log-table tbody tr:last-child td {
      border-bottom: none;
    }

    /* User cell */
    .log-user-name {
      font-weight: 600;
      color: var(--navy, #1A2B3C);
      font-size: 0.88rem;
    }
    .log-user-email {
      font-size: 0.78rem;
      color: var(--ink-muted, #8899AA);
      margin-top: 1px;
    }

    /* Timestamp cell */
    .log-time {
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
      color: var(--ink-soft, #4A5568);
      font-size: 0.85rem;
    }
    .log-time-date {
      font-weight: 600;
      color: var(--navy, #1A2B3C);
    }
    .log-time-clock {
      color: var(--ink-muted, #8899AA);
      margin-left: 0.3rem;
    }

    /* Action badges */
    .log-action {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.2rem 0.65rem;
      border-radius: 100px;
      font-size: 0.76rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }
    .log-action.login        { background: #DCFCE7; color: #166534; }
    .log-action.logout       { background: #FEE2E2; color: #991B1B; }
    .log-action.login_failed { background: #FEF3C7; color: #92400E; }
    .log-action.pageview     { background: #DBEAFE; color: #1E40AF; }

    /* IP + Browser */
    .log-ip {
      font-family: "SF Mono", "Cascadia Code", "Consolas", monospace;
      font-size: 0.8rem;
      color: var(--ink-muted, #8899AA);
    }
    .log-browser {
      max-width: 140px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 0.8rem;
      color: var(--ink-muted, #8899AA);
    }

    /* ── States ── */
    .log-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1rem;
      color: var(--ink-muted, #8899AA);
      font-size: 0.9rem;
      gap: 0.5rem;
    }
    .log-spinner {
      width: 28px; height: 28px;
      border: 3px solid var(--border, #E2E8EF);
      border-top-color: var(--gold, #C5A059);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    /* ── Pagination ── */
    .log-pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.8rem;
      padding: 1rem 1.5rem;
      border-top: 1px solid var(--border-soft, #EEF2F6);
      background: rgba(248,249,250,0.4);
    }
    .log-page-info {
      font-size: 0.8rem;
      color: var(--ink-muted, #8899AA);
      font-weight: 500;
    }

    /* ── Animations ── */
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .log-header { flex-direction: column; align-items: stretch; }
      .log-header-left { justify-content: space-between; }
      .log-header-right { justify-content: flex-end; }
      .log-table th, .log-table td { padding: 0.5rem 0.6rem; font-size: 0.8rem; }
      .log-card { border-radius: 8px; }
    }
  </style>

  <script src="nav.js"></script>
  <script src="footer.js"></script>
  <script src="log.js"></script>
</body>
</html>
