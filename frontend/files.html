<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DMSKI Dateien</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:wght@500;600&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="dashboard.css" />
</head>
<body>
  <div id="authGate" class="auth-gate">
    <img src="assets/logo-dmski.png" alt="DMSKI" style="height:2.2rem;opacity:.7" />
    <p style="margin:.8rem 0 0;color:#4a6672;font-size:.92rem">Sitzung wird geprüft…</p>
  </div>
  <main class="page" style="display:none" id="dashboardMain">
    <header class="topbar">
      <div class="brand-lockup">
        <a href="/dashboard.html" class="brand-home-link" aria-label="Zur Startseite">
          <img src="assets/logo-dmski.png" alt="DMSKI" class="header-logo" />
        </a>
      </div>
      <div class="actions-cell">
        <button id="logoutBtn" type="button" class="ghost">Abmelden</button>
      </div>
    </header>

    <section class="card files-card">
      <div class="list-header-row">
        <div class="list-header-main">
          <h2 id="listTitle">Fall</h2>
          <div id="casePersonsRow" class="case-persons-row"></div>
          <section id="analysisReportBar" class="analysis-report" aria-live="polite">
            <div class="analysis-report-head">
              <div>
                <p class="analysis-report-eyebrow">KI-Report</p>
                <h3 class="analysis-report-title">Gesamtbeurteilung des Dossiers</h3>
              </div>
              <div class="analysis-report-head-actions">
                <p id="analysisReportHint" class="analysis-report-hint">Analysen werden geladen…</p>
                <button id="exportPdfReportBtn" type="button" class="filter-btn filter-btn--report">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><circle cx="10" cy="15" r="2"/><path d="m13 17 2 2"/></svg>
                  PDF KI-Report
                </button>
              </div>
            </div>
            <div id="analysisReportTactics"></div>
            <div id="analysisReportMeta" class="analysis-report-meta"></div>
            <div id="analysisReportGrid" class="analysis-report-grid"></div>
            <div id="analysisReportAkteure"></div>
          </section>
        </div>
        <button id="deleteCaseBtn" type="button" class="icon-btn danger" aria-label="Dossier löschen" title="Dossier löschen">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M9 3h6l1 2h4v2H4V5h4l1-2zm1 6h2v9h-2V9zm4 0h2v9h-2V9zM7 9h2v9H7V9z" />
          </svg>
        </button>
      </div>

      <!-- ── Filter Section ── -->
      <div class="filter-section">

        <!-- Row 1: Filter Inputs -->
        <div class="filter-controls">
          <div class="filter-group">
            <label class="filter-label" for="fileTypeFilter">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
              Dateityp
            </label>
            <select id="fileTypeFilter" class="field-input">
              <option value="all">Alle Typen</option>
              <option value="pdf">PDF</option>
              <option value="png">PNG</option>
              <option value="jpg">JPG / JPEG</option>
            </select>
          </div>
          <div class="filter-group">
            <label class="filter-label" for="dateFromFilter">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
              Upload ab
            </label>
            <input id="dateFromFilter" type="date" class="field-input" />
          </div>
          <div class="filter-group">
            <label class="filter-label" for="dateToFilter">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
              Upload bis
            </label>
            <input id="dateToFilter" type="date" class="field-input" />
          </div>
        </div>

        <!-- Row 2: Sort Bar -->
        <div class="sort-bar">
          <span class="sort-bar-label">Sortierung</span>
          <div class="sort-pills">
            <button id="sortUploadDateBtn" type="button" class="sort-pill sort-pill--active">
              Upload-Datum <span id="sortUploadArrow" class="sort-dir">↓</span>
            </button>
            <button id="sortFileDateBtn" type="button" class="sort-pill">
              Dokument-Datum <span id="sortFileArrow" class="sort-dir"></span>
            </button>
          </div>
        </div>

        <!-- Row 3: Actions -->
        <div class="filter-actions">
          <button id="toggleMultiDeleteBtn" type="button" class="filter-btn filter-btn--danger">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M3 6h18"/><path d="M19 6l-1 14H6L5 6"/><path d="M8 6V4h8v2"/></svg>
            Mehrere löschen
          </button>
          <button id="downloadAllFilesBtn" type="button" class="filter-btn filter-btn--files">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            PDF Files Download
          </button>
          <button id="goToUploadBtn" type="button" class="filter-btn filter-btn--upload">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            + Dateien hochladen
          </button>
        </div>

      </div>

      <table>
        <thead>
          <tr>
            <th id="selectAllHeader" class="checkbox-col hidden"><input type="checkbox" id="selectAllCheckbox" /></th>
            <th>Vorschau</th>
            <th>Analyse</th>
          </tr>
        </thead>
        <tbody id="filesTableBody"></tbody>
      </table>

      <p id="listMessage" class="message"></p>
      <div id="undoBar" class="undo-bar hidden" aria-live="polite"></div>
      <div id="multiDeleteBar" class="multi-delete-bar hidden" aria-live="polite">
        <span id="multiDeleteCount"></span>
        <button id="executeMultiDeleteBtn" type="button" class="delete-btn">Löschen</button>
        <button id="cancelMultiDeleteBtn" type="button" class="ghost">Abbrechen</button>
      </div>
    </section>

    <div id="previewModal" class="preview-modal hidden" aria-hidden="true">
      <div class="preview-modal-backdrop" data-close-preview="true"></div>
      <div class="preview-modal-dialog" role="dialog" aria-modal="true" aria-label="Dokument Vorschau">
        <div class="preview-modal-top">
          <p id="previewModalTitle" class="preview-modal-title">Dokument Vorschau</p>
          <div class="preview-modal-actions">
            <button id="zoomOutBtn" type="button" class="ghost">-</button>
            <span id="zoomLevel" class="zoom-level">100%</span>
            <button id="zoomInBtn" type="button" class="ghost">+</button>
            <button id="zoomMaxBtn" type="button" class="ghost">400%</button>
            <button id="zoomResetBtn" type="button" class="ghost">Zurücksetzen</button>
            <button id="closePreviewBtn" type="button" class="ghost">Schliessen</button>
          </div>
        </div>
        <div id="previewModalViewport" class="preview-modal-viewport"></div>
      </div>
    </div>

    <footer class="dashboard-footer">
      <span>Copyright © <span id="copyrightYear"></span> Prompted by AiKMU // GetLeedz GmbH</span>
      <span class="footer-sep">·</span>
      <a href="/impressum.html">Impressum</a>
      <span class="footer-sep">·</span>
      <a href="/datenschutz.html">Datenschutz</a>
    </footer>
  </main>

  <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" crossorigin="anonymous"></script>
  <script src="files.js"></script>
</body>
</html>
