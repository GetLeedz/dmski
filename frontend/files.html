<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DMSKI Files</title>
  <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:wght@500;600&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="dashboard.css" />
  <script>if(!sessionStorage.getItem("token"))window.location.replace("/login.html");</script>
</head>
<body>
  <div id="authGate" class="auth-gate">
    <div class="auth-gate-loader">
      <div class="dmski-pulse-ring"></div>
      <img src="assets/logo-dmski.png" alt="DMSKI" class="auth-gate-logo" />
    </div>
    <p class="auth-gate-text">Dossier wird geladen…</p>
  </div>
  <style>
    .auth-gate-loader {
      position: relative;
      width: 80px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .auth-gate-logo {
      height: 2rem;
      opacity: .8;
      position: relative;
      z-index: 1;
    }
    .dmski-pulse-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid rgba(197,160,89,0.15);
      border-top-color: rgba(197,160,89,0.7);
      animation: dmski-spin 1s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }
    .dmski-pulse-ring::after {
      content: "";
      position: absolute;
      inset: 4px;
      border-radius: 50%;
      border: 2px solid rgba(197,160,89,0.08);
      border-bottom-color: rgba(197,160,89,0.4);
      animation: dmski-spin 1.6s cubic-bezier(0.4, 0, 0.2, 1) infinite reverse;
    }
    @keyframes dmski-spin {
      to { transform: rotate(360deg); }
    }
    .auth-gate-text {
      margin: 1rem 0 0;
      color: rgba(197,160,89,0.6);
      font-size: .92rem;
      letter-spacing: .02em;
      animation: dmski-fade-pulse 2s ease-in-out infinite;
    }
    @keyframes dmski-fade-pulse {
      0%, 100% { opacity: .5; }
      50% { opacity: 1; }
    }
    .files-panel-section-header {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      padding: 0 0 0.8rem;
      margin-bottom: 0.5rem;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .files-panel-section-header .forensic-title {
      margin: 0;
      font-size: 1rem;
      font-family: inherit;
    }
  </style>
  <main class="page" style="display:none" id="dashboardMain">
    <div id="site-nav"></div>

    <section class="card files-card">
      <div class="list-header-row">
        <div class="list-header-main">
          <h2 id="listTitle">Fall</h2>
          <div id="casePersonsRow" class="case-persons-row"></div>
          <section id="analysisReportBar" class="analysis-report" aria-live="polite">
            <div class="analysis-report-head">
              <div>
                <p class="analysis-report-eyebrow">KI-Report</p>
                <h3 class="analysis-report-title">Gesamtbeurteilung des Dossiers</h3>
              </div>
              <div class="analysis-report-head-actions">
                <p id="analysisReportHint" class="analysis-report-hint">Analysen werden geladen…</p>
                <button id="exportPdfReportBtn" type="button" class="filter-btn filter-btn--report">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><circle cx="10" cy="15" r="2"/><path d="m13 17 2 2"/></svg>
                  PDF KI-Report
                </button>
              </div>
            </div>
            <div id="analysisReportGrid" class="analysis-report-grid"></div>
            <div id="analysisReportMeta" class="analysis-report-meta"></div>
            <div id="analysisReportTactics"></div>
            <div id="analysisReportAkteure"></div>
          </section>

          <!-- ── Forensic MASTER SCAN Section 6 ── -->
          <section id="forensicSection" class="forensic-section">
            <div class="forensic-header">
              <div class="forensic-header-text">
                <div class="forensic-section-badge">6</div>
                <h3 class="forensic-title">Fall-Analyse</h3>
              </div>
              <div class="forensic-header-action">
                <div id="forensicWave" class="forensic-wave hidden" aria-hidden="true">
                  <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
                </div>
                <button id="startForensicScanBtn" type="button" class="forensic-scan-btn">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <circle cx="12" cy="12" r="10"/><path d="M12 2a10 10 0 0 1 0 20"/><path d="M2 12h20"/><path d="M12 2c2.8 3.1 4.4 6.4 4.5 10-.1 3.6-1.7 6.9-4.5 10"/>
                  </svg>
                  Fall-Analyse starten
                </button>
                <button id="cancelForensicScanBtn" type="button" class="forensic-cancel-btn hidden">Abbrechen</button>
              </div>
            </div>
            <div id="forensicProgress" class="forensic-progress hidden">
              <div class="forensic-progress-bar"><div id="forensicProgressFill" class="forensic-progress-fill"></div></div>
              <p id="forensicProgressText" class="forensic-progress-text">Analyse wird gestartet…</p>
            </div>
            <div id="forensicResults" class="forensic-results hidden"></div>
          </section>

        </div>
        <button id="deleteCaseBtn" type="button" class="icon-btn danger" aria-label="Dossier löschen" title="Dossier löschen">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M9 3h6l1 2h4v2H4V5h4l1-2zm1 6h2v9h-2V9zm4 0h2v9h-2V9zM7 9h2v9H7V9z" />
          </svg>
        </button>
      </div>

      <!-- ── Section 7: Files Panel (toolbar + table unified) ── -->
      <div class="files-panel">
        <div class="files-panel-section-header">
          <div class="forensic-section-badge">7</div>
          <h3 class="forensic-title">Ihre Files</h3>
        </div>

        <!-- Row 1: Upload + Search -->
        <div class="fp-header">
          <button id="goToUploadBtnHero" type="button" class="fp-upload-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            Files hochladen
          </button>

          <select id="fileTypeFilter" class="fp-input" style="display:none"><option value="all">Alle</option></select>
          <div class="fp-search-wrap">
            <svg class="fp-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <input id="fileSearchInput" type="text" class="fp-search" placeholder="Files durchsuchen — Name, Verfasser, Personen, Inhalt…" />
          </div>
        </div>

        <!-- Row 2: Filters + Sort -->
        <div class="fp-filters-row">
          <div class="fp-filters">
            <div class="fp-filter">
              <label class="fp-label" for="dateFromFilter">Upload ab</label>
              <input id="dateFromFilter" type="date" class="fp-input" />
            </div>
            <div class="fp-filter">
              <label class="fp-label" for="dateToFilter">Upload bis</label>
              <input id="dateToFilter" type="date" class="fp-input" />
            </div>
          </div>

          <div class="fp-sort">
            <span class="fp-sort-label">Sortierung</span>
            <div class="fp-sort-group">
              <span class="fp-sort-name">Upload-Datum</span>
              <button id="sortUploadAscBtn" type="button" class="fp-sort-btn" data-sort-field="uploadDate" data-sort-order="asc" title="Älteste zuerst">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5"/><path d="M5 12l7-7 7 7"/></svg>
              </button>
              <button id="sortUploadDescBtn" type="button" class="fp-sort-btn fp-sort-btn--active" data-sort-field="uploadDate" data-sort-order="desc" title="Neueste zuerst">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="M5 12l7 7 7-7"/></svg>
              </button>
            </div>
            <div class="fp-sort-group">
              <span class="fp-sort-name">File-Datum</span>
              <button id="sortFileAscBtn" type="button" class="fp-sort-btn" data-sort-field="fileDate" data-sort-order="asc" title="Älteste zuerst">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5"/><path d="M5 12l7-7 7 7"/></svg>
              </button>
              <button id="sortFileDescBtn" type="button" class="fp-sort-btn" data-sort-field="fileDate" data-sort-order="desc" title="Neueste zuerst">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="M5 12l7 7 7-7"/></svg>
              </button>
            </div>
          </div>
        </div>

        <!-- Row 3: Actions -->
        <div class="fp-actions">
          <button id="toggleMultiDeleteBtn" type="button" class="fp-action-btn fp-action--danger">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M19 6l-1 14H6L5 6"/><path d="M8 6V4h8v2"/></svg>
            Mehrere löschen
          </button>
          <button id="downloadAllFilesBtn" type="button" class="fp-action-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Download alle Files als PDF
          </button>
          <button id="reanalyzeAllBtn" type="button" class="fp-action-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6"/><path d="M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
            Alle neu analysieren
          </button>
        </div>

        <table>
        <thead>
          <tr>
            <th id="selectAllHeader" class="checkbox-col hidden"><input type="checkbox" id="selectAllCheckbox" /></th>
            <th>Vorschau</th>
            <th>Analyse</th>
          </tr>
        </thead>
        <tbody id="filesTableBody"></tbody>
      </table>
      </div><!-- /files-panel -->

      <p id="listMessage" class="message"></p>
      <div id="undoBar" class="undo-bar hidden" aria-live="polite"></div>
      <div id="multiDeleteBar" class="multi-delete-bar hidden" aria-live="polite">
        <span id="multiDeleteCount"></span>
        <button id="executeMultiDeleteBtn" type="button" class="delete-btn">Löschen</button>
        <button id="cancelMultiDeleteBtn" type="button" class="ghost">Abbrechen</button>
      </div>
    </section>

    <div id="previewModal" class="preview-modal hidden" aria-hidden="true">
      <div class="preview-modal-backdrop" data-close-preview="true"></div>
      <div class="preview-modal-dialog" role="dialog" aria-modal="true" aria-label="File Preview">
        <div class="preview-modal-top">
          <p id="previewModalTitle" class="preview-modal-title">File Preview</p>
          <div class="preview-modal-actions">
            <button id="zoomOutBtn" type="button" class="ghost">-</button>
            <span id="zoomLevel" class="zoom-level">100%</span>
            <button id="zoomInBtn" type="button" class="ghost">+</button>
            <button id="zoomMaxBtn" type="button" class="ghost">400%</button>
            <button id="zoomResetBtn" type="button" class="ghost">Zurücksetzen</button>
            <button id="closePreviewBtn" type="button" class="ghost">Schliessen</button>
          </div>
        </div>
        <div id="previewModalViewport" class="preview-modal-viewport"></div>
      </div>
    </div>

    <div id="site-footer"></div>
  </main>

  <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" crossorigin="anonymous"></script>
  <script src="nav.js"></script>
  <script src="files.js"></script>
  <script src="footer.js"></script>
</body>
</html>
