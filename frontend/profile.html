<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mein Profil – DMSKI</title>
  <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="dashboard.css" />
  <style>
    /* ═══════════════════════════════════════════
       PROFILE PAGE – Premium Design
    ═══════════════════════════════════════════ */
    :root {
      --profile-accent: #1A2B3C;
      --profile-accent2: #243447;
      --profile-mid: #C5A059;
    }

    .profile-layout {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 1.25rem 4rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    /* ── Profile hero card ── */
    .profile-hero {
      background: linear-gradient(135deg, #1A2B3C 0%, #243447 100%);
      border-radius: 18px;
      padding: 2rem 2.2rem 2rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
      box-shadow: 0 8px 32px rgba(26,43,60,.25);
      position: relative;
      overflow: hidden;
    }
    .profile-hero::before {
      content: "";
      position: absolute;
      top: -40%;
      right: -5%;
      width: 260px;
      height: 260px;
      border-radius: 50%;
      background: rgba(255,255,255,.06);
      pointer-events: none;
    }
    .profile-hero::after {
      content: "";
      position: absolute;
      bottom: -30%;
      right: 15%;
      width: 160px;
      height: 160px;
      border-radius: 50%;
      background: rgba(255,255,255,.04);
      pointer-events: none;
    }

    .profile-avatar {
      width: 4.5rem;
      height: 4.5rem;
      border-radius: 50%;
      background: rgba(255,255,255,.18);
      border: 2.5px solid rgba(255,255,255,.35);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.75rem;
      font-weight: 800;
      color: #fff;
      flex-shrink: 0;
      letter-spacing: -.02em;
      backdrop-filter: blur(8px);
    }
    .profile-hero-info { flex: 1; min-width: 0; }
    .profile-hero-name {
      font-size: 1.4rem;
      font-weight: 800;
      color: #fff;
      margin: 0 0 .2rem;
      letter-spacing: -.01em;
      line-height: 1.2;
    }
    .profile-hero-email {
      font-size: .88rem;
      color: rgba(255,255,255,.8);
      margin: 0 0 .55rem;
    }

    .badge-role {
      display: inline-flex;
      align-items: center;
      gap: .3rem;
      padding: .22rem .75rem;
      border-radius: 999px;
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .05em;
      text-transform: uppercase;
    }
    .badge-admin        { background: rgba(254,243,199,.9); color: #78350f; }
    .badge-customer     { background: rgba(209,250,229,.9); color: #065f46; }
    .badge-collaborator { background: rgba(224,231,255,.9); color: #3730a3; }

    /* ── Section cards ── */
    .profile-card {
      background: #fff;
      border: 1px solid #dae2e8;
      border-radius: 16px;
      box-shadow: 0 2px 12px rgba(15,43,54,.07);
      overflow: hidden;
    }

    .profile-card-head {
      display: flex;
      align-items: center;
      gap: .75rem;
      padding: 1.25rem 1.6rem;
      border-bottom: 1px solid #edf2f5;
      background: #f5f6f8;
    }
    .profile-card-icon {
      width: 2.2rem;
      height: 2.2rem;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .profile-card-icon--teal  { background: linear-gradient(135deg, #1A2B3C, #243447); }
    .profile-card-icon--blue  { background: linear-gradient(135deg, #2563eb, #1d4ed8); }
    .profile-card-icon--amber { background: linear-gradient(135deg, #f59e0b, #d97706); }
    .profile-card-icon svg { width: 1.05rem; height: 1.05rem; stroke: #fff; fill: none; }

    .profile-card-head-text { flex: 1; min-width: 0; }
    .profile-card-title {
      margin: 0 0 .1rem;
      font-size: .98rem;
      font-weight: 700;
      color: #0f2b36;
    }
    .profile-card-sub {
      margin: 0;
      font-size: .8rem;
      color: #4a6672;
    }

    .profile-card-body { padding: 1.4rem 1.6rem; }

    /* ── Form helpers ── */
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }
    @media (max-width: 500px) { .two-col { grid-template-columns: 1fr; } }

    .three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: .65rem; }
    @media (max-width: 600px) { .three-col { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 400px) { .three-col { grid-template-columns: 1fr; } }

    .mb-3 { margin-bottom: .75rem; }
    .mb-4 { margin-bottom: 1rem; }

    /* ── Password box ── */
    .password-box {
      background: #f5f6f8;
      border: 1px solid rgba(26,43,60,.1);
      border-radius: 12px;
      padding: 1.1rem 1.2rem;
      margin-top: .25rem;
    }
    .password-box-title {
      font-size: .88rem;
      font-weight: 700;
      color: #0f2b36;
      margin: 0 0 .85rem;
      display: flex;
      align-items: center;
      gap: .45rem;
    }
    .password-box-title svg { width: .95rem; height: .95rem; stroke: var(--profile-accent); fill: none; }

    /* PW requirements */
    .pw-reqs { list-style:none; padding:0; margin:.6rem 0 0; display:flex; flex-wrap:wrap; gap:.3rem .8rem; }
    .pw-reqs li { font-size:.75rem; color:rgba(26,43,60,.4); display:flex; align-items:center; gap:.3rem; }
    .pw-reqs li::before { content:"○"; font-size:.6rem; }
    .pw-reqs li.pw-ok { color:#16a34a; }
    .pw-reqs li.pw-ok::before { content:"●"; }
    .pw-reqs li.pw-fail { color:#b91c1c; }
    .pw-reqs li.pw-fail::before { content:"○"; }

    /* PW gen/eye buttons */
    .pw-actions { display:flex; gap:.4rem; margin-top:.5rem; }
    .pw-action-btn {
      display:inline-flex; align-items:center; justify-content:center; gap:.3rem;
      padding:.4rem .8rem; border:1px solid rgba(26,43,60,.12); border-radius:8px;
      background:#fff; color:#1A2B3C; font-size:.78rem; font-weight:600;
      cursor:pointer; transition:all 120ms;
    }
    .pw-action-btn:hover { background:rgba(26,43,60,.04); border-color:rgba(26,43,60,.2); }
    .pw-action-btn svg { width:.85rem; height:.85rem; }

    /* ── Generated password box ── */
    .generated-pwd {
      display: flex;
      align-items: center;
      gap: .6rem;
      background: #ecfdf5;
      border: 1.5px solid #6ee7b7;
      border-radius: 10px;
      padding: .75rem 1rem;
      font-size: .92rem;
      color: #065f46;
      font-weight: 700;
      word-break: break-all;
      margin-top: .75rem;
    }

    /* ── Fachpersonen list ── */
    .fach-list {
      display: flex;
      flex-direction: column;
      gap: .55rem;
      margin-bottom: 1.2rem;
    }
    .fach-card {
      display: flex;
      align-items: center;
      gap: .85rem;
      padding: .75rem 1rem;
      background: linear-gradient(135deg, #fafcfd, #f4f8f9);
      border: 1px solid #daeaf0;
      border-radius: 12px;
      transition: box-shadow .15s, border-color .15s;
    }
    .fach-card:hover {
      box-shadow: 0 3px 14px rgba(26,43,60,.1);
      border-color: #b8d4dc;
    }
    .fach-avatar {
      width: 2.5rem;
      height: 2.5rem;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .95rem;
      font-weight: 800;
      color: #fff;
      flex-shrink: 0;
      background: linear-gradient(135deg, #1A2B3C, #1A2B3C);
    }
    .fach-info { flex: 1; min-width: 0; }
    .fach-name {
      font-size: .9rem;
      font-weight: 700;
      color: #0f2b36;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .fach-email {
      font-size: .78rem;
      color: #5a7a8a;
      margin-top: .06rem;
    }
    .fach-role-badge {
      display: inline-flex;
      align-items: center;
      padding: .2rem .65rem;
      border-radius: 999px;
      background: linear-gradient(135deg, #e0f2fe, #bae6fd);
      color: #0369a1;
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .03em;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .fach-case {
      font-size: .72rem;
      color: #0369a1;
      white-space: nowrap;
      flex-shrink: 0;
      padding: .18rem .55rem;
      background: #e0f2fe;
      border: 1px solid #bae6fd;
      border-radius: 6px;
      font-weight: 600;
      max-width: 160px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .fach-date {
      font-size: .73rem;
      color: #8ba4b0;
      white-space: nowrap;
      flex-shrink: 0;
      padding: .18rem .5rem;
      background: #f0f4f6;
      border-radius: 6px;
    }

    .fach-invite {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 1.8rem;
      height: 1.8rem;
      border-radius: 8px;
      border: 1px solid #6ee7b7;
      background: #f0fdf4;
      color: #047857;
      cursor: pointer;
      transition: background .15s;
      flex-shrink: 0;
    }
    .fach-invite:hover { background: #dcfce7; border-color: #34d399; }
    .fach-invite:disabled { opacity: .5; cursor: default; }
    .fach-invite svg { width: .85rem; height: .85rem; }

    .fach-remove {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 1.8rem;
      height: 1.8rem;
      border-radius: 8px;
      border: 1px solid #fca5a5;
      background: #fff5f5;
      color: #b91c1c;
      cursor: pointer;
      transition: background .15s;
      flex-shrink: 0;
    }
    .fach-remove:hover { background: #fee2e2; border-color: #f87171; }
    .fach-remove svg { width: .85rem; height: .85rem; stroke: currentColor; fill: none; }

    /* ── Add Fachperson form panel ── */
    /* ── Shared action-button style (same look for +Fachperson and +Neuen Kunden) ── */
    .action-btn {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      padding: .6rem 1.15rem;
      background: linear-gradient(135deg, #1A2B3C, #1A2B3C);
      border: none;
      border-radius: 10px;
      color: #fff;
      font: inherit;
      font-size: .87rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .15s, box-shadow .15s;
      box-shadow: 0 2px 10px rgba(26,43,60,.22);
      text-decoration: none;
    }
    .action-btn:hover { opacity: .9; box-shadow: 0 4px 16px rgba(26,43,60,.32); }
    .action-btn svg { width: .9rem; height: .9rem; stroke: #fff; fill: none; flex-shrink: 0; }
    .action-btn .chevron {
      width: .85rem; height: .85rem;
      stroke: rgba(255,255,255,.75); fill: none; flex-shrink: 0;
      transition: transform .2s;
    }
    .action-btn[aria-expanded="true"] .chevron { transform: rotate(180deg); }

    /* keep the old selector as alias so nothing breaks */
    .add-fach-toggle { display: none; }

    .add-fach-panel {
      background: linear-gradient(135deg, #f5fafc, #eef4f7);
      border: 1px solid #cfe2ea;
      border-radius: 14px;
      padding: 1.25rem 1.3rem 1.1rem;
      margin-top: .75rem;
      display: none;
    }
    .add-fach-panel.open { display: block; }
    .add-fach-panel-title {
      font-size: .82rem;
      font-weight: 700;
      color: #0f2b36;
      text-transform: uppercase;
      letter-spacing: .07em;
      margin: 0 0 .9rem;
    }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      color: #8ba4b0;
      padding: 1.8rem 0;
      font-size: .88rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .5rem;
    }
    .empty-state svg { width: 2.2rem; height: 2.2rem; opacity: .3; }

    /* ── Admin tabs ── */
    .tab-row {
      display: flex;
      gap: .4rem;
      margin-bottom: 1.25rem;
      background: #edf2f5;
      padding: .3rem;
      border-radius: 10px;
      flex-wrap: wrap;
    }
    .tab-btn {
      flex: 1;
      min-width: 0;
      padding: .45rem .9rem;
      border-radius: 8px;
      border: none;
      background: transparent;
      color: #4a6672;
      font-weight: 600;
      font-size: .85rem;
      cursor: pointer;
      transition: all .15s;
    }
    .tab-btn.active {
      background: #fff;
      color: #0f2b36;
      box-shadow: 0 1px 4px rgba(15,43,54,.1);
    }

    .customer-card {
      display: flex;
      align-items: center;
      gap: .75rem;
      padding: .75rem 1rem;
      border: 1px solid #dae2e8;
      border-radius: 12px;
      background: #fff;
      margin-bottom: .5rem;
      transition: box-shadow .15s;
    }
    .customer-card:hover { box-shadow: 0 2px 10px rgba(26,80,104,.08); }
    .customer-avatar {
      width: 2.3rem;
      height: 2.3rem;
      border-radius: 50%;
      background: linear-gradient(135deg, #dbeafe, #bfdbfe);
      color: #1d4ed8;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: .9rem;
      flex-shrink: 0;
    }
    .customer-info { flex: 1; min-width: 0; }
    .customer-name { font-weight: 600; color: #1e3a45; font-size: .9rem; }
    .customer-email { font-size: .78rem; color: #6b8896; margin-top: .06rem; }

    @media (max-width: 600px) {
      .profile-hero { flex-direction: column; text-align: center; gap: 1rem; padding: 1.5rem 1.25rem; }
      .profile-card-head, .profile-card-body { padding-left: 1.1rem; padding-right: 1.1rem; }
    }

    /* Google Places Autocomplete styling */
    .pac-container {
      border-radius: 12px;
      border: 1px solid rgba(26,43,60,.1);
      box-shadow: 0 8px 32px rgba(26,43,60,.15);
      font-family: "Inter", system-ui, sans-serif;
      margin-top: 4px;
      z-index: 9999;
    }
    .pac-item {
      padding: .6rem .85rem;
      font-size: .84rem;
      color: #1A2B3C;
      border-top: 1px solid rgba(26,43,60,.05);
      cursor: pointer;
      transition: background .12s ease;
    }
    .pac-item:first-child { border-top: none; }
    .pac-item:hover, .pac-item-selected {
      background: rgba(197,160,89,.08);
    }
    .pac-item-query {
      font-weight: 600;
      color: var(--navy, #1A2B3C);
    }
    .pac-icon { display: none; }
    .pac-logo::after { display: none; }
  </style>
  <script>if(!sessionStorage.getItem("token"))window.location.replace("/login.html");</script>
</head>
<body>

  <!-- Auth gate -->
  <div id="authGate" class="auth-gate">
    <img src="assets/logo-dmski.png" alt="DMSKI" style="height:2.2rem;opacity:.7" />
    <p style="margin:.8rem 0 0;color:#4a6672;font-size:.92rem">Sitzung wird geprüft…</p>
  </div>

  <main class="page" style="display:none" id="profileMain">

    <div id="site-nav"></div>

    <div class="profile-layout">

      <!-- ── Profil-Hero (unified page-hero with avatar) ── -->
      <div class="page-hero">
        <div class="profile-avatar" id="avatarLetter">?</div>
        <div class="page-hero-text">
          <h1 id="profileName">Mein Profil</h1>
          <p id="profileEmail" style="margin-bottom:.35rem"></p>
          <span id="profileBadge" class="badge-role badge-customer"></span>
        </div>
      </div>

      <!-- ── 1. Profildaten bearbeiten ── -->
      <div class="profile-card" id="sectionProfile">
        <div class="profile-card-head">
          <div class="profile-card-icon profile-card-icon--teal">
            <svg viewBox="0 0 20 20" stroke-width="1.7"><circle cx="10" cy="7" r="3.5"/><path d="M3 17c0-3.314 3.134-6 7-6s7 2.686 7 6" stroke-linecap="round"/></svg>
          </div>
          <div class="profile-card-head-text">
            <h2 class="profile-card-title">Profildaten &amp; Zugangsdaten</h2>
            <p class="profile-card-sub">Name, E-Mail, Kontakt und optionale Passwortänderung</p>
          </div>
        </div>
        <div class="profile-card-body">
          <form id="profileForm">
            <div class="two-col mb-3">
              <div class="field-group">
                <label class="field-label" for="fieldSalutation">Anrede</label>
                <select id="fieldSalutation" class="field-input">
                  <option value="">–</option>
                  <option value="Herr">Herr</option>
                  <option value="Frau">Frau</option>
                </select>
              </div>
              <div class="field-group">
                <label class="field-label" for="fieldTitle">Titel</label>
                <select id="fieldTitle" class="field-input">
                  <option value="">Kein Titel</option>
                  <option value="Dr.">Dr.</option>
                  <option value="Dr. med.">Dr. med.</option>
                  <option value="Dr. iur.">Dr. iur.</option>
                  <option value="Prof.">Prof.</option>
                  <option value="Prof. Dr.">Prof. Dr.</option>
                  <option value="lic. iur.">lic. iur.</option>
                  <option value="MLaw">MLaw</option>
                  <option value="RA">RA</option>
                </select>
              </div>
            </div>
            <div class="two-col mb-3">
              <div class="field-group">
                <label class="field-label" for="fieldFirstName">Vorname</label>
                <input id="fieldFirstName" type="text" class="field-input" placeholder="Max" />
              </div>
              <div class="field-group">
                <label class="field-label" for="fieldLastName">Nachname</label>
                <input id="fieldLastName" type="text" class="field-input" placeholder="Mustermann" />
              </div>
            </div>
            <div class="field-group mb-3">
              <label class="field-label" for="fieldEmail">E-Mail-Adresse</label>
              <input id="fieldEmail" type="email" class="field-input" placeholder="name@beispiel.ch" />
            </div>
            <div class="two-col mb-3">
              <div class="field-group">
                <label class="field-label" for="fieldAddress">Adresse</label>
                <input id="fieldAddress" type="text" class="field-input" placeholder="Musterstrasse 1, 8000 Zürich" />
              </div>
              <div class="field-group">
                <label class="field-label" for="fieldMobile">Mobile</label>
                <input id="fieldMobile" type="tel" class="field-input" placeholder="+41 79 000 00 00" />
              </div>
            </div>

            <!-- Meine Funktion – nur für Fallreviewer sichtbar -->
            <div class="field-group mb-4" id="fieldFunctionGroup" style="display:none">
              <label class="field-label" for="fieldFunction">
                Meine Funktion
                <span style="font-weight:400;color:#6b8896;font-size:.78rem;margin-left:.3em">(kann nach der Einladung korrigiert werden)</span>
              </label>
              <select id="fieldFunction" class="field-input">
                <option value="">Funktion wählen …</option>
                <option value="Gutachter/in">Gutachter/in</option>
                <option value="Therapeut/in">Therapeut/in</option>
                <option value="Anwalt / Anwältin">Anwalt / Anwältin</option>
                <option value="Berater/in">Berater/in</option>
                <option value="Psychologe / Psychologin">Psychologe / Psychologin</option>
                <option value="Psychiater/in">Psychiater/in</option>
                <option value="Arzt / Ärztin">Arzt / Ärztin</option>
                <option value="Sozialarbeiter/in">Sozialarbeiter/in</option>
                <option value="Familienbegleiter/in">Familienbegleiter/in</option>
                <option value="Mediator/in">Mediator/in</option>
                <option value="Beistand / Beiständin">Beistand / Beiständin</option>
                <option value="Kinderanwalt / Kinderanwältin">Kinderanwalt / Kinderanwältin</option>
                <option value="Vertrauensperson">Vertrauensperson</option>
                <option value="Andere">Andere</option>
              </select>
            </div>

            <div class="password-box">
              <p class="password-box-title">
                <svg viewBox="0 0 20 20" stroke-width="1.7"><rect x="5" y="9" width="10" height="8" rx="2"/><path d="M7 9V6.5a3 3 0 0 1 6 0V9" stroke-linecap="round"/></svg>
                Passwort ändern <span style="font-weight:400;color:#6b8896;font-size:.82rem">(optional)</span>
              </p>
              <div class="field-group mb-3">
                <label class="field-label" for="fieldCurrentPwd">Aktuelles Passwort</label>
                <input id="fieldCurrentPwd" type="password" class="field-input" placeholder="••••••••" autocomplete="current-password" />
              </div>
              <div class="two-col">
                <div class="field-group">
                  <label class="field-label" for="fieldNewPwd">Neues Passwort</label>
                  <input id="fieldNewPwd" type="password" class="field-input" placeholder="••••••••" autocomplete="new-password" />
                </div>
                <div class="field-group">
                  <label class="field-label" for="fieldNewPwd2">Bestätigung</label>
                  <input id="fieldNewPwd2" type="password" class="field-input" placeholder="••••••••" autocomplete="new-password" />
                </div>
              </div>
              <div class="pw-actions">
                <button type="button" id="pwdGenBtn" class="pw-action-btn" title="Sicheres Passwort generieren">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
                  Generieren

    async function initAddressAutocomplete() {
      try {
        const { Autocomplete } = await google.maps.importLibrary("places");
        const input = document.getElementById("fieldAddress");
        if (!input) return;

        const autocomplete = new Autocomplete(input, {
          types: ["address"],
          componentRestrictions: { country: ["ch", "de", "at", "li"] },
          fields: ["formatted_address"]
        });

        autocomplete.addListener("place_changed", () => {
          const place = autocomplete.getPlace();
          if (place && place.formatted_address) {
            input.value = place.formatted_address;
          }
        });
      } catch (e) {
        console.warn("Google Places Autocomplete not available:", e.message);
