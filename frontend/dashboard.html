<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DMSKI Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="dashboard.css" />
</head>
<body>
  <main class="page">
    <header class="topbar">
      <div class="brand-lockup">
        <a href="/dashboard.html" class="brand-home-link" aria-label="Zur Startseite">
          <img src="assets/logo-dmski.png" alt="DMSKI" class="header-logo" />
        </a>
      </div>
      <button id="logoutBtn" class="ghost">Logout</button>
    </header>

    <section class="card">
      <h2>Neuen Fall anlegen</h2>
      <form id="caseForm" class="grid">
        <label class="full">
          Name
          <input id="caseName" name="caseName" type="text" placeholder="Fallname / Mandat" required />
        </label>
        <button id="createCaseBtn" type="submit" class="full">Dossier eröffnen</button>
      </form>

      <div class="open-case">
        <h3>Bestehendes Dossier öffnen</h3>
        <label>
          Dossier auswählen
          <select id="existingCasesSelect">
            <option value="">Lade Fallliste...</option>
          </select>
        </label>
      </div>

      <p id="caseMessage" class="message"></p>
    </section>

    <section class="card">
      <h2>Nächster Schritt</h2>
      <p class="hint">Nach dem Eröffnen oder Auswählen eines Dossiers öffnet sich automatisch die Upload-Seite. Die Dateiliste ist dort über einen separaten Button erreichbar.</p>
    </section>

    <footer class="dashboard-footer">
      <span>Copyright © <span id="copyrightYear"></span> Prompted by AiKMU // GetLeedz GmbH</span>
      <span class="footer-sep">·</span>
      <a href="/impressum.html">Impressum</a>
      <span class="footer-sep">·</span>
      <a href="/datenschutz.html">Datenschutz</a>
    </footer>
  </main>

  <script src="dashboard.js"></script>
</body>
</html>
