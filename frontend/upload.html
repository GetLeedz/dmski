<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DMSKI Upload</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="dashboard.css" />
</head>
<body>
  <div id="authGate" class="auth-gate">
    <img src="assets/logo-dmski.png" alt="DMSKI" style="height:2.2rem;opacity:.7" />
    <p style="margin:.8rem 0 0;color:#4a6672;font-size:.92rem">Sitzung wird geprüft…</p>
  </div>
  <main class="page" style="display:none" id="dashboardMain">
    <header class="topbar">
      <div class="brand-lockup">
        <a href="/dashboard.html" class="brand-home-link" aria-label="Zur Startseite">
          <img src="assets/logo-dmski.png" alt="DMSKI" class="header-logo" />
        </a>
      </div>
      <div class="actions-cell">
        <button id="logoutBtn" type="button" class="ghost">Logout</button>
      </div>
    </header>

    <section class="card">
      <h2>Datei-Upload & Analyse in Realtime</h2>
      <p id="activeCaseBanner" class="active-case-banner"></p>
      <p id="workspaceHint" class="hint"></p>

      <div class="upload-actions">
        <button id="goToListBtn" type="button" class="filter-btn">Files</button>
      </div>

      <p>Erlaubte Formate: PDF, JPG, JPEG, PNG. Mehrere Dateien gleichzeitig möglich.</p>

      <div id="dropzone" class="dropzone" tabindex="0">
        Dateien hier hineinziehen oder klicken, um Dateien auszuwählen.
        <input id="fileInput" type="file" multiple accept=".pdf,.jpg,.jpeg,.png,application/pdf,image/jpeg,image/png" hidden />
      </div>

      <div id="uploadQueue" class="upload-queue"></div>

      <p id="uploadMessage" class="message"></p>
    </section>

    <footer class="dashboard-footer">
      <span>Copyright © <span id="copyrightYear"></span> Prompted by AiKMU // GetLeedz GmbH</span>
      <span class="footer-sep">·</span>
      <a href="/impressum.html">Impressum</a>
      <span class="footer-sep">·</span>
      <a href="/datenschutz.html">Datenschutz</a>
    </footer>
  </main>

  <script src="upload.js"></script>
</body>
</html>
