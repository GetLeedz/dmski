<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DMSKI Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page">
    <section class="ambient" aria-hidden="true">
      <div class="shape shape-a"></div>
      <div class="shape shape-b"></div>
      <div class="shape shape-c"></div>
    </section>

    <section class="login-shell" aria-label="Login Bereich">
      <div class="brand-block">
        <img src="assets/logo-dmski_slogan.png" alt="DMSKI - Fakten. Muster. Beweise. Die digitale Fallanalyse." class="brand-logo" />
        <h1>Willkommen<br />zurück</h1>
        <p class="subtitle">Melde dich an, um deine Dokumente sicher zu verwalten.</p>
      </div>

      <form class="login-card" id="loginForm" novalidate>
        <h2>Login</h2>
        <p class="card-kicker">Secure access for your legal workflow</p>

        <label for="email">E-Mail</label>
        <input id="email" name="email" type="email" autocomplete="username email" autocapitalize="none" spellcheck="false" placeholder="name@beispiel.ch" required />

        <label for="password">Passwort</label>
        <div class="password-field">
          <input id="password" name="password" type="password" autocomplete="current-password" minlength="8" placeholder="Mindestens 10 Zeichen" required />
          <button type="button" class="icon-button" id="togglePassword" aria-label="Passwort anzeigen" aria-pressed="false">
            <svg class="eye-icon eye-open" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M12 5c5.23 0 9.27 3.11 10.8 6.55a1.1 1.1 0 0 1 0 .9C21.27 15.89 17.23 19 12 19S2.73 15.89 1.2 12.45a1.1 1.1 0 0 1 0-.9C2.73 8.11 6.77 5 12 5Zm0 2c-4.12 0-7.27 2.35-8.75 5 1.48 2.65 4.63 5 8.75 5s7.27-2.35 8.75-5C19.27 9.35 16.12 7 12 7Zm0 2.2A2.8 2.8 0 1 1 9.2 12 2.8 2.8 0 0 1 12 9.2Zm0 2a.8.8 0 1 0 .8.8.8.8 0 0 0-.8-.8Z" />
            </svg>
            <svg class="eye-icon eye-closed" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M3.28 2.22a1 1 0 0 1 1.42 0l16.98 16.98a1 1 0 1 1-1.42 1.42l-3.02-3.02A13.65 13.65 0 0 1 12 19c-5.23 0-9.27-3.11-10.8-6.55a1.1 1.1 0 0 1 0-.9A12.42 12.42 0 0 1 6.2 6.44L3.28 3.64a1 1 0 0 1 0-1.42ZM7.66 7.9A10.22 10.22 0 0 0 3.25 12c1.48 2.65 4.63 5 8.75 5a10.9 10.9 0 0 0 3.7-.62l-2.06-2.06a2.8 2.8 0 0 1-3.96-3.96L7.66 7.9ZM12 5c5.23 0 9.27 3.11 10.8 6.55a1.1 1.1 0 0 1 0 .9 12.96 12.96 0 0 1-4.02 4.76l-1.43-1.43A10.64 10.64 0 0 0 20.75 12C19.27 9.35 16.12 7 12 7c-.6 0-1.2.05-1.77.14L8.61 5.52A13.76 13.76 0 0 1 12 5Z" />
            </svg>
          </button>
        </div>

        <div class="row">
          <label class="checkbox-wrap">
            <input id="remember" name="remember" type="checkbox" />
            <span>Angemeldet bleiben</span>
          </label>
          <a href="#" class="text-link">Passwort vergessen?</a>
        </div>

        <button type="submit" id="submitButton">Anmelden</button>
        <button type="button" id="passkeyButton" class="passkey-button">Mit Passkey anmelden</button>
        <p class="passkey-note">Passkey-Login ist aktiviert, sobald dein Browser eine gespeicherte Passkey-Identität für diese Domain findet.</p>
        <p id="message" class="message" role="status" aria-live="polite"></p>
      </form>
    </section>

    <footer class="site-footer">Copyright © <span id="copyrightYear"></span> Prompted by AiKMU // GetLeedz GmbH</footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
